hook: claude-code
build:
  dockerfile: Dockerfile
  files:
    - entrypoint.sh
    - proxy-setup.js
    - command-guard.sh
env:
  - CLAUDE_CODE_OAUTH_TOKEN
  - ANTHROPIC_API_KEY
  - AWS_ACCESS_KEY_ID
  - AWS_SECRET_ACCESS_KEY
  - AWS_SESSION_TOKEN
  - AWS_REGION
  - AWS_DEFAULT_REGION
  - AWS_PROFILE
  - GOOGLE_APPLICATION_CREDENTIALS
  - GOOGLE_CLOUD_PROJECT
  - GOOGLE_CLOUD_LOCATION
  - VERTEX_REGION
  - AZURE_OPENAI_API_KEY
  - AZURE_OPENAI_ENDPOINT
  - AZURE_API_VERSION
base_cedar: |
  // Claude Code baseline: selected by auth mode below.
base_cedar_blocks:
  - auth_modes: ["oauth"]
    cedar: |
      permit(
        principal,
        action == Action::"http:Request",
        resource == Resource::"platform.claude.com"
      );

      permit(
        principal,
        action == Action::"http:Request",
        resource == Resource::"claude.ai"
      );

  - auth_modes: ["api"]
    cedar: |
      permit(
        principal,
        action == Action::"http:Request",
        resource == Resource::"api.anthropic.com"
      );

  - auth_modes: ["bedrock"]
    cedar: |
      permit(
        principal,
        action == Action::"http:Request",
        resource == Resource::"amazonaws.com"
      );

  - auth_modes: ["vertex"]
    cedar: |
      permit(
        principal,
        action == Action::"http:Request",
        resource == Resource::"googleapis.com"
      );

  - auth_modes: ["foundry"]
    when_env: ["AZURE_OPENAI_ENDPOINT"]
    cedar: |
      permit(
        principal,
        action == Action::"http:Request",
        resource == Resource::"{{ envDomain "AZURE_OPENAI_ENDPOINT" }}"
      );
