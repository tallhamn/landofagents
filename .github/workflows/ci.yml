name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Unit and integration tests
        run: go test ./...

      - name: GAP control conformance tests
        run: go test ./cmd/loa -run '^TestGapControlConformance' -count=1

      - name: Layer boundary tests
        run: go test ./engine -run '^TestEngineNeverImportsAppOrCmd|^TestGapSpecHasZeroInternalDeps|^TestAppNeverImportsCmd' -count=1

      - name: Engine containment boundary tests
        run: go test ./engine/contain -run '^TestContainCoreDoesNotImportRuntimeAdapters|^TestContainCoreHasNoRuntimeNameBranching' -count=1
